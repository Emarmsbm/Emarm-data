<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emarm Data</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
}

header{
background:#0A3D91;
color:white;
padding:20px;
text-align:center;
}

header h1{
font-size:34px;
}

header p{
margin-top:10px;
}

.hero{
padding:40px 20px;
text-align:center;
}

.hero h2{
color:#0A3D91;
margin-bottom:15px;
}

.hero p{
color:#555;
margin-bottom:25px;
}

.btn{
display:inline-block;
padding:15px 30px;
background:#00C853;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.services{
padding:30px;
}

.services h2{
text-align:center;
color:#0A3D91;
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:15px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
text-align:center;
box-shadow:0 5px 12px rgba(0,0,0,.1);
font-size:18px;
}

footer{
background:#0A3D91;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}
</style>

</head>

<header>
<h1>📶 EMARM DATA</h1>
<p>Fast • Secure • Affordable</p>

<section class="hero">

Electricity and Cable TV instantly.
</p>

</section>

<section class="services">

<h2>Our Services</h2>

<div class="grid">

<div class="card">📶 MTN</div>

<div class="card">📶 Airtel</div>

<div class="card">📶 Glo</div>

<div class="card">📶 9mobile</div>

<div class="card">💡 Electricity</div>

<div class="card">📺 Cable TV</div>

</div>

</section>

<footer>

© 2026 Emarm Data <br>

</footer>
